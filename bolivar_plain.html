<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تيشرت بوليفار اوفرسايز سادة | 7TB</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-container { display: flex; flex-wrap: wrap; gap: 40px; padding: 40px 0; align-items: flex-start; }
        
        /* الصورة على اليمين */
        .product-image { flex: 1; min-width: 300px; background: #1a1a1a; height: 450px; border-radius: 15px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        
        /* التفاصيل على اليسار */
        .product-info { flex: 1; min-width: 300px; }
        .price-tag { color: #e67e22; font-size: 2.5rem; margin: 15px 0; font-weight: bold; }
        .option-group { margin: 20px 0; }
        .option-group label { display: block; margin-bottom: 8px; color: #a0a0a0; font-weight: bold; }
        select { width: 100%; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        
        .buy-now { display: block; background: #25d366; color: #fff; text-align: center; padding: 18px; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 30px; font-size: 1.2rem; transition: 0.3s; }
        .buy-now:hover { background: #128c7e; transform: translateY(-3px); }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">7TB<span>.</span></div>
            <a href="index.html" style="color: #fff; text-decoration: none;">← العودة للمتجر</a>
        </nav>
    </header>

    <main class="container">
        <div class="product-container">
            <div class="product-image">
                <img src="./bolivar_plaint.jpeg" alt="تيشرت بوليفار سادة 7TB">
            </div>

            <div class="product-info">
                <h1>تيشرت بوليفار oversize سادة</h1>
                <p class="price-tag">320 EGP</p>
                <p>خامة بوليفار بريميوم ثقيلة، مريحة جداً في اللبس وبتستحمل الكرفسة واللاندري. متوفرة بألوان أساسية شيك.</p>
                
                <div class="option-group">
                    <label>اللون:</label>
                    <select id="colorSelect">
                        <option value="أسود">أسود</option>
                        <option value="أبيض">أبيض</option>
                        <option value="كحلي">كحلي</option>
                        <option value="رمادي">رمادي</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>المقاس:</label>
                    <select id="sizeSelect">
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                        <option>XXL</option>
                    </select>
                </div>

                <a href="#" onclick="orderViaWhatsApp('تيشرت بوليفار سادة', '300')" class="buy-now">اطلب عبر واتساب</a>
                
                <p style="text-align: center; color: #ffcc00; font-size: 0.85rem; margin-top: 15px; line-height: 1.5; background: rgba(255, 204, 0, 0.1); padding: 10px; border-radius: 8px; border: 1px dashed #ffcc00;">
                    ⚠️ <b>ملحوظة:</b><br>
                    السعر الموضح للتيشرت السادة فقط.<br>
                    لإضافة تصميم خاص، تواصل معنا لتحديد التكلفة.
                </p>
            </div>
        </div>
    </main>

    <script>
        function orderViaWhatsApp(productName, price) {
            const color = document.getElementById('colorSelect').value;
            const size = document.getElementById('sizeSelect').value;
            const phone = "201027946608"; 
            const message = `أهلاً 7TB، حابب أطلب:\n- المنتج: ${productName}\n- اللون: ${color}\n- المقاس: ${size}\n- السعر: ${price} EGP`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>

    <script>
        function orderViaWhatsApp(productName, price) {
            const color = document.getElementById('colorSelect').value;
            const size = document.getElementById('sizeSelect').value;
            const phone = "201027946608"; 
            const message = `أهلاً 7TB، حابب أطلب:\n- المنتج: ${productName}\n- اللون: ${color}\n- المقاس: ${size}\n- السعر: ${price} EGP`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
