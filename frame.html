<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برواز خشبي مودرن | 7TB</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-container { display: flex; flex-wrap: wrap; gap: 40px; padding: 40px 0; align-items: flex-start; }
        .product-image { flex: 1; min-width: 300px; background: #1a1a1a; height: 450px; border-radius: 15px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { flex: 1; min-width: 300px; }
        .price-tag { color: #e67e22; font-size: 2.5rem; margin: 15px 0; font-weight: bold; }
        .option-group { margin: 20px 0; }
        .option-group label { display: block; margin-bottom: 8px; color: #a0a0a0; font-weight: bold; }
        select { width: 100%; padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .buy-now { display: block; background: #25d366; color: #fff; text-align: center; padding: 18px; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 30px; font-size: 1.2rem; transition: 0.3s; }
        .buy-now:hover { background: #128c7e; transform: translateY(-3px); }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">7TB<span>.</span></div>
            <a href="index.html" style="color: #fff; text-decoration: none;">← العودة للمتجر</a>
        </nav>
    </header>

    <main class="container">
    <div class="product-container">
        <div class="product-image">
            <img src="./frame.jpg" alt="برواز  مودرن 7TB" style="width: 100%; height: 100%; object-fit: cover;">
        </div>

        <div class="product-info">
            <h1>برواز  مودرن</h1>
            <p class="price-tag" id="displayPrice">200 EGP</p>
            <p>برواز أنيق بجودة عالية، متوفر بألوان (أسود، أبيض، دهبي) ليناسب ذوقك.</p>
            
            <div class="option-group">
                <label>لون البرواز:</label>
                <select id="frameColor">
                    <option value="أسود">أسود مط</option>
                    <option value="أبيض">أبيض ناصع</option>
                    <option value="دهبي">دهبي كلاسيك</option>
                </select>
            </div>

            <div class="option-group">
                <label>المقاس:</label>
                <select id="frameSize" onchange="updatePrice()">
                    <option value="20x30" data-price="200">20x30 سم (200 EGP)</option>
                    <option value="30x40" data-price="300">30x40 سم (300 EGP)</option>
                </select>
            </div>

            <a href="#" onclick="orderFrame()" class="buy-now">اطلب عبر واتساب</a>

            <p style="text-align: center; color: #ffcc00; font-size: 0.85rem; margin-top: 15px; line-height: 1.5; background: rgba(255, 204, 0, 0.1); padding: 10px; border-radius: 8px; border: 1px dashed #ffcc00;">
                ⚠️ <b>ملحوظة هامة:</b><br>
                السعر يتغير حسب المقاس المختار.
            </p>
        </div>
    </div>
</main>
    

    <script>
        // وظيفة لتحديث السعر المعروض بناءً على المقاس
        function updatePrice() {
            const sizeSelect = document.getElementById('frameSize');
            const selectedOption = sizeSelect.options[sizeSelect.selectedIndex];
            const price = selectedOption.getAttribute('data-price');
            document.getElementById('displayPrice').innerText = price + " EGP";
        }

        function orderFrame() {
            const color = document.getElementById('frameColor').value;
            const sizeSelect = document.getElementById('frameSize');
            const size = sizeSelect.value;
            const price = sizeSelect.options[sizeSelect.selectedIndex].getAttribute('data-price');
            const phone = "201027946608"; 
            
            const message = `أهلاً 7TB، حابب أطلب برواز:\n- اللون: ${color}\n- المقاس: ${size}\n- السعر النهائي: ${price} EGP`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
<nav class="container">
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">7TB<span>.</span></a></div>

        <li><a href="index.html#frames">براويز</a></li>
    </ul>
</nav>
